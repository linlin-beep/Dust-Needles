<style>
        body {
            background-image: url('https://i.pinimg.com/736x/d4/d2/54/d4d254378f0f0896022e39908cf6b41d.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
        }

        /* Kod untuk menyembunyikan piring hitam lama dan labelnya */
        .vinyl-medium, .vinyl-grooves-medium, .vinyl-label-medium, .vertical-text-label, .vinyl-hole {
            display: none !important;
        }

        /* Kod khas untuk membuat gambar kaset anda menjadi bulatan dan berpusing */
        .split-vinyl-side {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }

        .split-vinyl-side::before {
            content: '';
            width: 300px; /* Saiz piring yang anda mahu */
            height: 300px;
            background-image: url('https://i.pinimg.com/736x/f7/01/c9/f701c9cadfd4b9fabfe94db6179a2f95.jpg') !important;
            background-size: cover;
            background-position: center;
            border-radius: 50%; /* Membuat gambar jadi bulatan sempurna */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); /* Sedikit bayang untuk kesan 3D */
            animation: spinCustom 20s linear infinite; /* Memulakan animasi pusingan */
            position: absolute;
        }

        /* Animasi pusingan 360 darjah */
        @keyframes spinCustom {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Pastikan pembungkus kad tidak menutup latar belakang renda */
        .split-card {
            background-color: transparent !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
        }
        
        .split-content-side {
            background-color: var(--card-bg) !important;
        }
    </style>
